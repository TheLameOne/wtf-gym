name: shared
description: Shared models, services, widgets, and utilities for WTF Gym apps.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.0
  hmssdk_flutter: ^1.10.4
  http: ^1.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  timeago: ^3.7.0
  logger: ^2.3.0
  shared_preferences: ^2.3.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
