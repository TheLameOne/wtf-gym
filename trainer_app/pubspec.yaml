  flutter_animate: ^4.5.0
  timeago: ^3.7.0
  share_plus: ^9.0.0
  logger: ^2.3.0
  shared_preferences: ^2.3.2
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
